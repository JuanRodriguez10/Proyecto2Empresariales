<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Libro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        form {
            max-width: 500px;
            margin: 0 auto;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input, select {
            width: 100%;
            padding: 5px;
            margin-top: 5px;
        }
        button {
            margin-top: 10px;
            padding: 5px 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }
        .checkbox-container input {
            width: auto;
            margin-right: 10px;
        }
        #autoresAgregados {
            margin-top: 5px;
            padding: 5px;
            border: 1px solid #ddd;
            min-height: 20px;
        }
        #autorCombo {
            width: calc(100% - 110px);
            margin-right: 10px;
        }
        #agregarAutorBtn {
            width: 100px;
        }
        .autor-combo-container {
            display: flex;
            align-items: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h1>Agregar Libro</h1>
    <form id="agregarLibroForm">
        <label for="titulo">Título:</label>
        <input type="text" id="titulo" name="titulo" required>

        <label for="autoresAgregados">Autores agregados:</label>
        <div id="autoresAgregados"></div>

        <div class="autor-combo-container">
            <select id="autorCombo">
                <option value="">Seleccione un autor</option>
                <option value="1">Autor 1</option>
                <option value="2">Autor 2</option>
                <option value="3">Autor 3</option>
            </select>
            <button type="button" id="agregarAutorBtn">Agregar Autor</button>
        </div>

        <label for="paginas">Número de páginas:</label>
        <input type="number" id="paginas" name="paginas" required>

        <label for="fechaPublicacion">Fecha de publicación:</label>
        <input type="date" id="fechaPublicacion" name="fechaPublicacion" required>

        <label for="precio">Precio:</label>
        <input type="number" id="precio" name="precio" step="0.01" required>

        <div class="checkbox-container">
            <input type="checkbox" id="tapaDura" name="tapaDura">
            <label for="tapaDura">Tapa dura</label>
        </div>

        <button type="submit">Agregar Libro</button>
    </form>

    <script>
        const autoresAgregados = [];

        document.getElementById('agregarAutorBtn').addEventListener('click', function() {
            const autorCombo = document.getElementById('autorCombo');
            const autorSeleccionado = autorCombo.options[autorCombo.selectedIndex];
            
            if (autorSeleccionado.value && !autoresAgregados.includes(autorSeleccionado.text)) {
                autoresAgregados.push(autorSeleccionado.text);
                actualizarAutoresAgregados();
                autorCombo.selectedIndex = 0;
            }
        });

        function actualizarAutoresAgregados() {
            const autoresAgregadosDiv = document.getElementById('autoresAgregados');
            autoresAgregadosDiv.textContent = autoresAgregados.join(', ');
        }

        document.getElementById('agregarLibroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Aquí iría la lógica para procesar el formulario
            console.log('Autores agregados:', autoresAgregados);
            alert('Libro agregado con éxito');
        });
    </script>
</body>
</html>
